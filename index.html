
<!DOCTYPE html>
<html lang="hu">
<head>
<meta charset="UTF-8">
<title>Urbex térkép</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>

<style>
  body { margin:0; font-family:Arial; }
  #map { height:90vh; width:100%; }
  #status { padding:10px; background:black; color:lime; }
  img { max-width:200px; border-radius:8px; }
</style>
</head>
<body>

<div id="status">Indítás...</div>
<div id="map"></div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script>
// MAP
var map = L.map('map').setView([47.4979, 19.0402], 8);

// 🔥 HYBRID (utcanevek + műhold)
var hybrid = L.tileLayer(
  'https://mt1.google.com/vt/lyrs=y&x={x}&y={y}&z={z}',
  { maxZoom: 20 }
).addTo(map);

// STATUS
function status(msg){
  document.getElementById("status").innerText = msg;
}

// CSV BETÖLTÉS
fetch("urbex_helyek.csv")
  .then(res => {
    if(!res.ok) throw new Error("Nincs CSV fájl!");
    return res.text();
  })
  .then(text => {
    const rows = text.split("\n").slice(1);
    let db = 0;

    rows.forEach(r => {
      if(!r.trim()) return;

      const c = r.split(",");

      const nev = c[0];
      const leiras = c[1];
      const lat = parseFloat(c[2]);
      const lng = parseFloat(c[3]);
      const nehezseg = c[4];
      const kep = c[5];

      if(!isNaN(lat) && !isNaN(lng)){
        L.marker([lat,lng]).addTo(map)
          .bindPopup(`
            <b>${nev}</b><br>
            ${leiras}<br>
            Nehézség: ${nehezseg}<br>
            <img src="${kep}">
          `);
        db++;
      }
    });

    status("Betöltve: " + db + " hely ✅");
  })
  .catch(e => {
    status("HIBA ❌: " + e.message);
    console.error(e);
  });

</script>

</body>
</html>
