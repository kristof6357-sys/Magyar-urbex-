<!DOCTYPE html>
<html lang="hu">
<head>
<meta charset="UTF-8">
<title>Magyar Ubex Térkép</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
<style>
  body { font-family: Arial, sans-serif; margin:0; padding:0; }
  #map { height: 90vh; width: 100%; }
  #search { margin: 10px; padding: 5px; width: 300px; font-size:16px; }
  h2 { margin-left: 10px; }
</style>
</head>
<body>

<h2>Magyar Ubex Térkép</h2>
<input type="text" id="search" placeholder="Hely keresése név alapján">
<div id="map"></div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
<script src="https://d3js.org/d3.v7.min.js"></script>

<script>
var map = L.map('map').setView([47.0, 19.0], 7);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
  attribution: '&copy; OpenStreetMap contributors'
}).addTo(map);

var markers = [];
var dataGlobal = [];

// CSV betöltése
d3.csv("ubex_helyek.csv").then(function(data) {
  dataGlobal = data; // a keresőhöz
  data.forEach(function(d) {
    var marker = L.marker([+d.lat, +d.lng]).addTo(map);
    marker.bindPopup(`<b>${d.name}</b><br>Nehezség: ${d.difficulty}<br><img src="${d.image}" width="200">`);
    markers.push(marker);
  });
});

// Keresés név alapján
document.getElementById("search").addEventListener("keyup", function(e){
  var query = e.target.value.toLowerCase();
  var place = dataGlobal.find(d => d.name.toLowerCase().includes(query));
  if(place){
    map.setView([+place.lat, +place.lng], 15);
  }
});
</script>

</body>
</html>
