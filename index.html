<!DOCTYPE html>
<html lang="hu">
<head>
<meta charset="UTF-8">
<title>Urbex Terkep</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
<style>
  body { margin:0; }
  #map { height:100vh; width:100%; }
  img { max-width:200px; border-radius:8px; }
</style>
</head>
<body>

<div id="map"></div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script>
// MAP
var map = L.map('map').setView([47.4979,19.0402],8);

// HYBRID GOOGLE
L.tileLayer('https://mt1.google.com/vt/lyrs=y&x={x}&y={y}&z={z}', { maxZoom:20 }).addTo(map);

// MARKEREK: minden hely közvetlenül a kódban
var places = [
  {nev:"Kistarcsai loter", leiras:"elhagyott katonai teren", lat:47.5212, lng:19.1988, nehezseg:"kozepes", kep:"https://via.placeholder.com/200"},
  {nev:"Elhagyott gyar 1", leiras:"regi ipari epulet", lat:47.50, lng:19.10, nehezseg:"konnyu", kep:"https://via.placeholder.com/200"},
  {nev:"Elhagyott gyar 2", leiras:"regi ipari epulet", lat:47.51, lng:19.11, nehezseg:"konnyu", kep:"https://via.placeholder.com/200"},
  {nev:"Elhagyott gyar 3", leiras:"regi ipari epulet", lat:47.52, lng:19.12, nehezseg:"kozepes", kep:"https://via.placeholder.com/200"},
  {nev:"Elhagyott gyar 4", leiras:"regi ipari epulet", lat:47.53, lng:19.13, nehezseg:"nehez", kep:"https://via.placeholder.com/200"},
  {nev:"Elhagyott gyar 5", leiras:"regi ipari epulet", lat:47.54, lng:19.14, nehezseg:"konnyu", kep:"https://via.placeholder.com/200"}
  // ide jöhet a további 114 hely ugyanezzel a formátummal
];

// MARKEREK HOZZÁADÁSA
places.forEach(function(p){
  L.marker([p.lat,p.lng]).addTo(map)
   .bindPopup("<b>"+p.nev+"</b><br>"+p.leiras+"<br><b>Nehézség:</b> "+p.nehezseg+"<br><img src='"+p.kep+"'>");
});
</script>

</body>
</html>
