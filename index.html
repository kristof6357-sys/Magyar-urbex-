
<!DOCTYPE html>
<html lang="hu">
<head>
<meta charset="UTF-8">
<title>Urbex térkép</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
<style>
  body { margin:0; font-family:Arial; }
  #map { height:100vh; width:100%; }
  .popup img { width:200px; border-radius:8px; }
</style>
</head>
<body>

<div id="map"></div>

<script src="https://unpkg.com/leaflet.gridlayer.googlemutant/Leaflet.GoogleMutant.js"></script>

<script>
// Térkép létrehozása
var map = L.map('map').setView([47.4979,19.0402], 8);

L.tileLayer('https://{s}.google.com/vt/lyrs=s&x={x}&y={y}&z={z}', {
  maxZoom: 20,
  subdomains:['mt0','mt1','mt2','mt3']
}).addTo(map);
  
// CSV betöltése fetch-sel
fetch("urbex_helyek.csv")
  .then(response => response.text())
  .then(data => {
    const rows = data.split("\n").slice(1); // az első sor a header
    rows.forEach(row => {
      if(row.trim() === "") return;
      const cols = row.split(",");
      const nev = cols[0];
      const leiras = cols[1];
      const lat = parseFloat(cols[2]);
      const lng = parseFloat(cols[3]);
      const nehezseg = cols[4];
      const kep = cols[5];

      if(!isNaN(lat) && !isNaN(lng)){
        L.marker([lat,lng]).addTo(map)
         .bindPopup(`<h3>${nev}</h3><p>${leiras}</p><b>Nehézség:</b> ${nehezseg}<br><img src="${kep}">`);
      }
    });
  });
</script>

</body>
</html>
