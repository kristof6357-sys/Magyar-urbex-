<!DOCTYPE html>
<html lang="hu">
<head>
<meta charset="UTF-8">
<title>Magyar Ubex Térkép</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
<style>
  body { font-family: Arial, sans-serif; margin:0; padding:0; }
  #map { height: 90vh; width: 100%; }
  #search { margin: 10px; padding: 5px; width: 300px; font-size:16px; }
  h2 { margin-left: 10px; }
</style>
</head>
<body>

<h2>Magyar Ubex Térkép</h2>
<input type="text" id="search" placeholder="Hely keresése név alapján">
<div id="map"></div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
<script src="https://d3js.org/d3.v7.min.js"></script>

<script>
var map = L.map('map').setView([47.0, 19.0], 7);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
  attribution: '&copy; OpenStreetMap contributors'
}).addTo(map);

var markers = [];
var dataGlobal = [];

fetch("urbex_helyek.csv")
  .then(response => response.text())
  .then(data => {
    const rows = data.split("\n").slice(1);
    rows.forEach(row => {
      const cols = row.split(",");
      const nev = cols[0];
      const leiras = cols[1];
      const lat = parseFloat(cols[2]);
      const lng = parseFloat(cols[3]);
      const nehezseg = cols[4];
      const kep = cols[5];
      if(!isNaN(lat) && !isNaN(lng)){
        L.marker([lat,lng]).addTo(map)
         .bindPopup(`<h3>${nev}</h3><p>${leiras}</p><b>Nehézség:</b> ${nehezseg}<br><img src="${kep}" width="200">`);
      }
    });
  });

// Keresés név alapján
document.getElementById("search").addEventListener("keyup", function(e){
  var query = e.target.value.toLowerCase();
  var place = dataGlobal.find(d => d.name.toLowerCase().includes(query));
  if(place){
    map.setView([+place.lat, +place.lng], 15);
  }
});
</script>

</body>
</html>
